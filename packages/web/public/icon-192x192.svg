<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <!-- Subtle top glow -->
  <rect width="192" height="96" rx="42" fill="url(#glow)"/>
  <!-- Window dots -->
  <circle cx="29" cy="29" r="3" fill="#f7768e" opacity="0.8"/>
  <circle cx="41" cy="29" r="3" fill="#e0af68" opacity="0.8"/>
  <circle cx="53" cy="29" r="3" fill="#9ece6a" opacity="0.8"/>
  <!-- Terminal prompt > -->
  <text x="96" y="111" text-anchor="middle" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="58" font-weight="700" fill="#7aa2f7">&gt;_</text>
  <!-- Blinking cursor -->
  <rect x="111" y="73" width="15" height="54" rx="2" fill="#7aa2f7" opacity="0.6"/>
  <!-- Bottom accent line -->
  <rect x="38" y="157" width="115" height="4" rx="2" fill="#7aa2f7" opacity="0.3"/>
</svg>