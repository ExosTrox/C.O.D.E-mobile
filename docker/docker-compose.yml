# ── CODE Mobile — Docker Compose ────────────────────────────────
#
# Cloudflare handles SSL termination and proxies to port 3000.
# No reverse proxy (Caddy/Nginx) needed.
#
# Cloudflare setup:
#   1. Add A record: code.gilbergarcia.com → 5.161.125.115 (orange cloud = proxied)
#   2. SSL/TLS mode: Flexible
#   3. WebSocket support is enabled by default in Cloudflare
#   4. Optional: Page Rules to cache *.js, *.css, *.woff2 from /assets/*
#
# Uses host networking so the container can reach the SSH tunnel
# on localhost:2222 (reverse tunnel from Mac).
#
# Usage:
#   docker compose up -d          # start
#   docker compose logs -f        # tail logs
#   docker compose down           # stop
#   docker compose build --no-cache && docker compose up -d  # rebuild + deploy

services:
  daemon:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: codemobile-daemon
    tty: true
    stdin_open: true
    network_mode: host
    volumes:
      # Persistent data (DB, sessions, hooks)
      - codemobile-data:/home/codemobile/.codemobile
      # Docker socket for OpenClaw container spawning
      - /var/run/docker.sock:/var/run/docker.sock
      # SSH key for remote Mac access
      - /root/.ssh/id_ed25519_codemobile:/home/codemobile/.ssh/id_ed25519_codemobile:ro
    environment:
      - PORT=80
      - HOST=0.0.0.0
      - NODE_ENV=production
      - DATA_DIR=/home/codemobile/.codemobile
      - CORS_ORIGINS=${CORS_ORIGINS:-https://code.gilbergarcia.com}
      - SERVER_HOST=code.gilbergarcia.com
      # Remote Mac terminal access via SSH tunnel
      - REMOTE_SSH_HOST=localhost
      - REMOTE_SSH_PORT=2222
      - REMOTE_SSH_USER=go
      - REMOTE_SSH_KEY=/home/codemobile/.ssh/id_ed25519_codemobile
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  codemobile-data:
